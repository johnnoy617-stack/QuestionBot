<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能 Question Bot - 知识库管理</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 智能 Question Bot</h1>
            <p class="subtitle">基于 DeepSeek + ChromaDB 的 RAG 问答系统</p>
            <div class="stats">
                <span class="badge">📚 知识库: {{ stats.total_docs }} 条</span>
                <span class="badge">💾 持久化存储</span>
            </div>
        </header>

        <!-- 标签页切换 -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('chat')">💬 聊天问答</button>
            <button class="tab-btn" onclick="switchTab('upload')">📤 上传文档</button>
            <button class="tab-btn" onclick="switchTab('manage')">⚙️ 知识库管理</button>
        </div>

        <!-- 聊天页面 -->
        <div id="chat-tab" class="tab-content active">
            <div class="chat-container">
                <div id="chat-history" class="chat-history">
                    <div class="welcome-message">
                        <p>👋 你好！我是智能助手，可以回答你上传的文档内容。</p>
                        <p>💡 提示：先在"上传文档"页面添加你的知识库！</p>
                    </div>
                </div>

                <div class="input-area">
                    <div class="input-group">
                        <input type="text" id="question-input" placeholder="输入你的问题..." autocomplete="off">
                        <button id="send-btn" onclick="sendQuestion()">
                            <span id="btn-text">发送</span>
                            <span id="btn-loading" class="loading hidden">⏳</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 上传页面 -->
        <div id="upload-tab" class="tab-content">
            <div class="upload-section">
                <h2>📤 上传文件到知识库</h2>

                <!-- 文件上传 -->
                <div class="upload-box" id="drop-zone">
                    <input type="file" id="file-input" accept=".txt,.md,.py,.json,.csv" onchange="handleFileSelect(this.files[0])">
                    <div class="upload-prompt">
                        <p>📁 点击选择文件 或 拖拽文件到此处</p>
                        <p class="small">支持: TXT, MD, PY, JSON, CSV (最大 16MB)</p>
                    </div>
                </div>

                <div id="upload-progress" class="hidden">
                    <p>正在上传... <span id="upload-status"></span></p>
                    <div class="progress-bar">
                        <div class="progress-fill"></div>
                    </div>
                </div>

                <hr class="divider">

                <!-- 文本粘贴 -->
                <h3>📝 或直接粘贴文本</h3>
                <textarea id="text-input" placeholder="在此粘贴文本内容..."></textarea>
                <input type="text" id="text-source" placeholder="来源标识（如：公司制度2024）" style="margin-top: 10px;">
                <button onclick="uploadText()" class="btn-primary">添加文本到知识库</button>
            </div>
        </div>

        <!-- 管理页面 -->
        <div id="manage-tab" class="tab-content">
            <div class="manage-section">
                <h2>⚙️ 知识库管理</h2>
                <div class="manage-actions">
                    <button onclick="refreshKnowledgeBase()" class="btn-secondary">🔄 刷新列表</button>
                    <button onclick="clearKnowledgeBase()" class="btn-danger">🗑️ 清空知识库</button>
                </div>
                <div id="kb-list" class="kb-list">
                    <p>点击"刷新列表"加载知识库内容...</p>
                </div>
            </div>
        </div>

    </div>

    <script>
        // 标签页切换
        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));

            document.getElementById(tabName + '-tab').classList.add('active');
            event.target.classList.add('active');

            if (tabName === 'manage') {
                refreshKnowledgeBase();
            }
        }

        // 聊天功能
        document.getElementById('question-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendQuestion();
        });

        async function sendQuestion() {
            const input = document.getElementById('question-input');
            const question = input.value.trim();

            if (!question) return;

            addMessage('user', question);
            input.value = '';
            setLoading(true);

            try {
                const response = await fetch('/ask', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({question: question})
                });

                const data = await response.json();

                if (data.success) {
                    addMessage('bot', data.answer);
                    // 显示来源
                    if (data.sources && data.sources.length > 0) {
                        console.log('参考来源：', data.sources);
                    }
                } else {
                    addMessage('bot', '抱歉，出错了：' + data.error);
                }
            } catch (error) {
                addMessage('bot', '网络错误：' + error.message);
            } finally {
                setLoading(false);
            }
        }

        function addMessage(role, content) {
            const chatHistory = document.getElementById('chat-history');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}-message`;

            const avatar = role === 'user' ? '👤' : '🤖';
            const name = role === 'user' ? '你' : 'Bot';

            messageDiv.innerHTML = `
                <div class="message-header">
                    <span class="avatar">${avatar}</span>
                    <span class="name">${name}</span>
                </div>
                <div class="message-content">${escapeHtml(content)}</div>
            `;

            chatHistory.appendChild(messageDiv);
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        // 文件上传
        function handleFileSelect(file) {
            if (!file) return;

            const progressDiv = document.getElementById('upload-progress');
            const statusSpan = document.getElementById('upload-status');

            progressDiv.classList.remove('hidden');
            statusSpan.textContent = file.name;

            const formData = new FormData();
            formData.append('file', file);

            fetch('/upload', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                progressDiv.classList.add('hidden');
                if (data.success) {
                    alert('✅ ' + data.message);
                    document.getElementById('file-input').value = '';
                } else {
                    alert('❌ 上传失败：' + data.error);
                }
            })
            .catch(error => {
                progressDiv.classList.add('hidden');
                alert('❌ 网络错误：' + error);
            });
        }

        // 拖拽上传
        const dropZone = document.getElementById('drop-zone');
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) handleFileSelect(files[0]);
        });

        // 文本上传
        async function uploadText() {
            const text = document.getElementById('text-input').value.trim();
            const source = document.getElementById('text-source').value.trim() || '手动输入';

            if (!text) {
                alert('请输入文本内容');
                return;
            }

            try {
                const response = await fetch('/upload_text', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({text: text, source: source})
                });

                const data = await response.json();

                if (data.success) {
                    alert('✅ ' + data.message);
                    document.getElementById('text-input').value = '';
                    document.getElementById('text-source').value = '';
                } else {
                    alert('❌ 失败：' + data.error);
                }
            } catch (error) {
                alert('❌ 网络错误：' + error);
            }
        }

        // 知识库管理
        async function refreshKnowledgeBase() {
            const listDiv = document.getElementById('kb-list');
            listDiv.innerHTML = '<p>加载中...</p>';

            try {
                const response = await fetch('/knowledge_base?limit=50');
                const data = await response.json();

                if (data.success) {
                    let html = `<p>共 ${data.total} 条文档</p>`;
                    html += '<div class="doc-list">';

                    data.documents.forEach((doc, index) => {
                        html += `
                            <div class="doc-item">
                                <div class="doc-header">
                                    <span class="doc-num">${index + 1}</span>
                                    <span class="doc-source">${escapeHtml(doc.source)}</span>
                                    <span class="doc-time">${doc.time}</span>
                                    <button onclick="deleteDoc('${doc.id}')" class="btn-small btn-danger">删除</button>
                                </div>
                                <div class="doc-content">${escapeHtml(doc.content)}</div>
                            </div>
                        `;
                    });

                    html += '</div>';
                    listDiv.innerHTML = html;
                } else {
                    listDiv.innerHTML = '<p>加载失败：' + data.error + '</p>';
                }
            } catch (error) {
                listDiv.innerHTML = '<p>网络错误：' + error + '</p>';
            }
        }

        async function deleteDoc(docId) {
            if (!confirm('确定要删除这条文档吗？')) return;

            try {
                const response = await fetch('/delete_doc', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({id: docId})
                });

                const data = await response.json();

                if (data.success) {
                    refreshKnowledgeBase();
                } else {
                    alert('删除失败：' + data.error);
                }
            } catch (error) {
                alert('网络错误：' + error);
            }
        }

        function clearKnowledgeBase() {
            if (confirm('⚠️ 警告：这将删除所有数据！确定吗？')) {
                alert('请在后端执行 clear_all() 方法清空数据（安全考虑）');
            }
        }

        // 工具函数
        function setLoading(isLoading) {
            const btnText = document.getElementById('btn-text');
            const btnLoading = document.getElementById('btn-loading');
            const sendBtn = document.getElementById('send-btn');

            if (isLoading) {
                btnText.classList.add('hidden');
                btnLoading.classList.remove('hidden');
                sendBtn.disabled = true;
            } else {
                btnText.classList.remove('hidden');
                btnLoading.classList.add('hidden');
                sendBtn.disabled = false;
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
